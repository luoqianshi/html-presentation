<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频演示文稿</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #08090d;
  --bg-cover: #070609;
  --bg-elevated: #0f0e14;
  --text: #f6f2e8;
  --text-secondary: #c4c0b6;
  --text-dim: #8a8580;
  --title: #c8a8ff;
  --accent: #ffc402;
  --border: rgba(255,255,255,0.10);
  --border-hover: rgba(255,255,255,0.18);
  --card-bg: rgba(255,255,255,0.055);
  --glass-bg: rgba(8,9,13,0.72);
  --radius: 14px;
  --radius-sm: 10px;
}

html { font-size: 18px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', 'Noto Sans SC', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
  cursor: default;
  user-select: none;
}

/* ═══════════ SLIDE ENGINE ═══════════ */
.deck {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

.slide {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6vh 10vw;
  background: var(--bg);
  opacity: 0;
  visibility: hidden;
  transform: translateY(40px) scale(0.98);
  transition: opacity 0.7s cubic-bezier(.22,1,.36,1),
              transform 0.7s cubic-bezier(.22,1,.36,1),
              visibility 0.7s;
  will-change: opacity, transform;
}

.slide.active {
  opacity: 1 !important;
  visibility: visible !important;
  transform: translateY(0) scale(1) !important;
}

.slide.exit-up {
  opacity: 0;
  visibility: hidden;
  transform: translateY(-40px) scale(0.98);
}

/* ═══════════ CONTROLS ═══════════ */
.controls {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 100;
  background: var(--glass-bg);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 8px 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
}

.controls button {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 22px;
  cursor: pointer;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: all 0.25s ease;
}
.controls button:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.controls button:disabled { opacity: 0.2; cursor: default; }
.controls button:disabled:hover { background: none; }

.controls .counter {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
  min-width: 56px;
  text-align: center;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.5px;
}

/* Progress Bar */
.progress {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: var(--title);
  z-index: 100;
  transition: width 0.5s cubic-bezier(.22,1,.36,1);
  box-shadow: none;
}

/* Slide Dots */
.dots {
  position: fixed;
  right: 28px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 100;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  cursor: pointer;
  transition: all 0.35s cubic-bezier(.22,1,.36,1);
  border: 1px solid rgba(255,255,255,0.04);
}
.dot.active {
  background: var(--title);
  transform: scale(1.5);
  box-shadow: none;
  border-color: transparent;
}
.dot:hover { background: rgba(255,255,255,0.2); }

.hint {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: var(--text-dim);
  z-index: 90;
  opacity: 1;
  transition: opacity 1s;
  pointer-events: none;
  letter-spacing: 1px;
}
.hint.hidden { opacity: 0; }

/* ═══════════ TYPOGRAPHY ═══════════ */
.slide-label {
  font-size: clamp(12px, 1.1vw, 15px);
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 20px;
}

h1 {
  font-size: clamp(42px, 5.5vw, 78px);
  font-weight: 800;
  line-height: 1.08;
  color: var(--text);
  letter-spacing: -0.01em;
}
h1 .highlight { color: var(--title); }
h1 .accent { color: var(--accent); }
.accent-text { color: var(--accent); }

h2 {
  font-size: clamp(34px, 4vw, 56px);
  font-weight: 700;
  line-height: 1.15;
  color: var(--title);
  letter-spacing: -0.01em;
}
h2 .highlight,
h2 .accent { color: var(--title); }

h3 {
  font-size: clamp(20px, 2.2vw, 28px);
  font-weight: 600;
  color: var(--text);
  margin-bottom: 10px;
  line-height: 1.3;
}

.subtitle {
  font-size: clamp(18px, 2vw, 26px);
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.65;
  margin: 20px auto 0 auto;
  max-width: 760px;
}

.body-text {
  font-size: clamp(17px, 1.7vw, 23px);
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.75;
}

.small-text {
  font-size: clamp(14px, 1.3vw, 17px);
  color: var(--text-dim);
  line-height: 1.6;
}

/* ═══════════ COMPONENTS ═══════════ */
.divider {
  width: 64px;
  height: 4px;
  background: var(--title);
  border-radius: 999px;
  margin: 22px auto;
  box-shadow: none;
}
.divider-accent { background: var(--title); }

/* Badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(196,168,255,0.08);
  border: 1px solid rgba(196,168,255,0.15);
  border-radius: 100px;
  padding: 10px 22px;
  font-size: 0.85rem;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.08em;
  margin-bottom: 40px;
  text-transform: uppercase;
  width: fit-content;
  backdrop-filter: blur(8px);
}
.badge .dot-yellow {
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
  flex-shrink: 0;
}
.badge .dot-gray {
  width: 5px; height: 5px;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  flex-shrink: 0;
}

/* Cards */
.card-grid {
  display: grid;
  gap: 24px;
  margin-top: 32px;
  flex: 0;
}
.card-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.card-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: clamp(26px, 2.8vw, 40px);
  display: flex;
  flex-direction: column;
  text-align: left;
  backdrop-filter: blur(12px);
  transition: all 0.35s cubic-bezier(.22,1,.36,1);
}
.card:hover {
  border-color: var(--border-hover);
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.35);
  background: rgba(255,255,255,0.04);
}
.card h3 {
  font-size: clamp(18px, 1.9vw, 25px);
  margin-bottom: 12px;
  text-align: center;
}
.card .body-text { font-size: clamp(15px, 1.4vw, 19px); }

/* Quote Block */
.quote-block {
  border-left: 4px solid var(--accent);
  padding: 22px 32px;
  background: rgba(255,196,2,0.08);
  border-radius: 0 16px 16px 0;
  margin: 22px 0;
  position: relative;
}
.quote-block::before {
  content: '"';
  position: absolute;
  top: 8px;
  left: 16px;
  font-size: 56px;
  color: rgba(255,201,71,0.08);
  font-family: Georgia, serif;
  line-height: 1;
}
.quote-block p {
  font-size: clamp(17px, 1.7vw, 23px);
  font-weight: 500;
  color: var(--accent);
  line-height: 1.75;
  font-style: italic;
  position: relative;
  z-index: 1;
}

/* VS Dialog */
.vs-row {
  display: flex;
  align-items: stretch;
  gap: 28px;
  margin-top: 28px;
}
.vs-col {
  flex: 1;
  border-radius: var(--radius);
  padding: clamp(22px, 2.4vw, 34px);
  display: flex;
  flex-direction: column;
  position: relative;
  text-align: left;
  transition: all 0.35s ease;
}
.vs-col:hover { transform: translateY(-2px); }
.vs-col h3 { font-size: clamp(18px, 1.9vw, 25px); margin-bottom: 12px; text-align: center; }
.vs-col .vs-tag { display: block; margin: 0 auto 16px auto; width: fit-content; }
.vs-col.left-col {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
}
.vs-col.right-col {
  background: rgba(185,142,255,0.10);
  border: 1px solid rgba(196,168,255,0.25);
  box-shadow: none;
}
.vs-col .vs-tag {
  display: inline-block;
  font-size: clamp(11px, 1vw, 13px);
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 6px 16px;
  border-radius: 8px;
  margin-bottom: 16px;
  width: fit-content;
}
.vs-col.left-col .vs-tag {
  background: rgba(255,255,255,0.06);
  color: var(--text-dim);
}
.vs-col.right-col .vs-tag {
  background: rgba(196,168,255,0.12);
  color: var(--title);
}
.vs-col .vs-icon { font-size: clamp(28px, 3vw, 40px); margin-bottom: 8px; }
.vs-col ul { list-style: none; padding: 0; }
.vs-col ul li {
  font-size: clamp(15px, 1.4vw, 19px);
  color: var(--text-secondary);
  line-height: 1.7;
  padding: 5px 0 5px 26px;
  position: relative;
}
.vs-col ul li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 13px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
}
.vs-col.left-col ul li::before { background: rgba(255,255,255,0.15); }
.vs-col.right-col ul li::before { background: var(--title); box-shadow: none; }

/* Steps */
.steps {
  display: flex;
  gap: 18px;
  margin-top: 32px;
  align-items: stretch;
}
.steps .step {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}
.step {
  flex: 1;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: clamp(22px, 2.6vw, 36px) clamp(16px, 1.8vw, 28px);
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  backdrop-filter: blur(10px);
  transition: all 0.35s cubic-bezier(.22,1,.36,1);
}
.step:hover {
  border-color: var(--border-hover);
  transform: translateY(-3px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.step .step-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 50px;
  height: 50px;
  margin: 0 auto 22px;
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 999px;
  background: rgba(255,255,255,0.055);
  color: var(--text);
  font-size: clamp(14px, 1.1vw, 17px);
  font-weight: 800;
  letter-spacing: 0;
  font-variant-numeric: tabular-nums;
}
.step h3 { font-size: clamp(17px, 1.5vw, 21px); margin-bottom: 8px; }
.step-arrow {
  display: flex;
  align-items: center;
  font-size: 24px;
  color: rgba(185,142,255,0.58);
}

/* Prompt Box */
.prompt-box {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: clamp(22px, 2.6vw, 32px) clamp(24px, 2.8vw, 36px);
  margin-top: 22px;
  backdrop-filter: blur(10px);
}
.prompt-box .prompt-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.prompt-box p {
  font-size: clamp(16px, 1.6vw, 21px);
  color: var(--text-secondary);
  line-height: 1.8;
}
.prompt-box p em {
  color: var(--accent);
  font-style: normal;
  font-weight: 500;
}

/* Highlight Bar */
.highlight-bar {
  background: rgba(185,142,255,0.10);
  border: 1px solid rgba(196,168,255,0.15);
  border-radius: var(--radius-sm);
  padding: clamp(20px, 2.4vw, 30px) clamp(24px, 2.8vw, 36px);
  margin-top: 20px;
  backdrop-filter: blur(8px);
  transition: all 0.3s ease;
}
.highlight-bar:hover {
  border-color: rgba(196,168,255,0.25);
  box-shadow: none;
}
.highlight-bar p {
  font-size: clamp(17px, 1.7vw, 22px);
  color: var(--text);
  line-height: 1.75;
}
.highlight-bar .accent-word {
  color: var(--accent);
  font-weight: 600;
}

/* Bullet List */
.bullet-list {
  list-style: none;
  padding: 0;
  margin-top: 18px;
}
.bullet-list li {
  font-size: clamp(16px, 1.6vw, 21px);
  color: var(--text-secondary);
  line-height: 1.85;
  padding: 6px 0 6px 30px;
  position: relative;
}
.bullet-list li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 15px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--title);
  box-shadow: none;
}
.bullet-list li .em {
  color: var(--accent);
  font-weight: 500;
}

/* Code Block */
.code-block {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius);
  padding: clamp(20px, 2.2vw, 28px) clamp(24px, 2.6vw, 32px);
  margin-top: 20px;
  font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
  overflow-x: auto;
  backdrop-filter: blur(8px);
}
.code-block code {
  font-size: clamp(14px, 1.35vw, 18px);
  color: var(--accent);
  line-height: 1.75;
  white-space: pre-wrap;
  word-break: break-word;
}

/* Cover Meta */
.cover-meta {
  margin-top: 40px;
  display: flex;
  gap: 14px;
  align-items: center;
  flex-wrap: wrap;
}
.cover-tag {
  font-size: clamp(13px, 1.1vw, 16px);
  font-weight: 500;
  color: var(--text-dim);
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  padding: 8px 18px;
  border-radius: 100px;
  backdrop-filter: blur(8px);
  transition: all 0.3s ease;
}
.cover-tag:hover {
  border-color: var(--border-hover);
  background: rgba(255,255,255,0.05);
}

/* Tag Row */
.tag-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 14px;
  justify-content: center;
}
.tag {
  font-size: clamp(12px, 1vw, 14px);
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 8px;
  letter-spacing: 0.5px;
}
.tag.tag-buy { background: rgba(255,196,2,0.10); color: var(--accent); border: 1px solid rgba(255,196,2,0.22); }
.tag.tag-sell { background: rgba(185,142,255,0.10); color: var(--title); border: 1px solid rgba(185,142,255,0.22); }

/* Icon Row */
.icon-row {
  display: flex;
  gap: 28px;
  margin-top: 18px;
}
.icon-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: clamp(15px, 1.4vw, 19px);
  color: var(--text-secondary);
}
.icon-item span:first-child { font-size: clamp(20px, 2.2vw, 26px); }

/* Big Num */
.big-num {
  font-size: 140px;
  font-weight: 900;
  color: var(--title);
  opacity: 0.08;
  position: absolute;
  top: 40px;
  right: 60px;
  line-height: 1;
}

/* End Card */
.end-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.end-card h2 {
  font-size: clamp(36px, 4vw, 56px);
  margin-bottom: 14px;
}

/* IPO Flow */
.ipo-flow {
  display: flex;
  align-items: center;
  gap: 32px;
  margin-top: 40px;
  justify-content: center;
  flex-wrap: wrap;
}
.ipo-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  min-width: 160px;
}
.ipo-circle {
  width: 92px;
  height: 92px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: 800;
  border: 2.5px solid;
  transition: all 0.3s ease;
}
.ipo-circle.i { border-color: var(--title); color: var(--title); background: rgba(196,168,255,0.06); }
.ipo-circle.p { border-color: var(--accent); color: var(--accent); background: rgba(255,201,71,0.04); }
.ipo-circle.o { border-color: rgba(255,255,255,0.24); color: var(--text); background: rgba(255,255,255,0.04); }
.ipo-circle:hover { transform: scale(1.08); }
.ipo-label {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
}
.ipo-desc {
  font-size: 14px;
  color: var(--text-dim);
  text-align: center;
  max-width: 160px;
}
.ipo-arrow {
  font-size: 28px;
  color: var(--text-dim);
}

/* Content Wrapper: centered, scaled up, with side margins */
.content-wrapper {
  width: 100%;
  max-width: 1000px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
  transform: scale(1.45);
  transform-origin: center center;
}

.content-wrapper .card-grid,
.content-wrapper .steps,
.content-wrapper .bullet-list,
.content-wrapper .highlight-box,
.content-wrapper .table-demo,
.content-wrapper .quote-block,
.content-wrapper .prompt-box,
.content-wrapper .code-block,
.content-wrapper .vs-row {
  text-align: left;
  width: 100%;
}

.content-wrapper .bullet-list {
  display: inline-block;
  width: auto;
  min-width: 60%;
  max-width: 100%;
}

.content-wrapper .divider {
  margin-left: auto;
  margin-right: auto;
}

/* Cover Layout */
.cover-layout {
  background: var(--bg-cover);
  align-items: flex-start;
  justify-content: center;
  padding-left: 14vw;
  text-align: left;
}
.cover-layout .content-wrapper {
  text-align: left;
  align-items: flex-start;
}
.cover-layout h1,
.cover-layout .subtitle,
.cover-layout .cover-meta {
  text-align: left;
  margin-left: 0;
}
.cover-layout .subtitle {
  max-width: 640px;
}
.cover-layout .cover-meta {
  justify-content: flex-start;
}

/* ═══════════ ANIMATIONS ═══════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.slide.active .anim { animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) both; }
.slide.active .anim:nth-child(1) { animation-delay: 0.06s; }
.slide.active .anim:nth-child(2) { animation-delay: 0.12s; }
.slide.active .anim:nth-child(3) { animation-delay: 0.20s; }
.slide.active .anim:nth-child(4) { animation-delay: 0.28s; }
.slide.active .anim:nth-child(5) { animation-delay: 0.36s; }
.slide.active .anim:nth-child(6) { animation-delay: 0.44s; }
.slide.active .anim:nth-child(7) { animation-delay: 0.52s; }

/* ═══════════ RESPONSIVE ═══════════ */
@media (max-width: 900px) {
  .slide { padding: 4vh 5vw; }
  .card-grid.cols-2, .card-grid.cols-3 { grid-template-columns: 1fr; }
  .vs-row { flex-direction: column; gap: 16px; }
  .steps { flex-direction: column; }
  .dots { display: none; }
  .ipo-flow { flex-direction: column; }
  .ipo-arrow { transform: rotate(90deg); }
  .content-wrapper { transform: scale(1.15); }
}
</style>
</head>
<body>

<!-- ═══════════ CONTROLS ═══════════ -->
<div class="progress" id="progress"></div>
<div class="dots" id="dots"></div>
<div class="hint" id="hint">← →</div>

<div class="deck" id="deck">

<!-- 在此添加你的 slide 内容 -->

</div><!-- /deck -->

<!-- ═══════════ NAVIGATION ═══════════ -->
<div class="controls">
  <button id="prevBtn" title="上一页">‹</button>
  <span class="counter" id="counter">01 / 01</span>
  <button id="nextBtn" title="下一页">›</button>
</div>

<script>
(function() {
  const slides = document.querySelectorAll('.slide');
  const total = slides.length;
  let current = 0;

  const counter = document.getElementById('counter');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const progress = document.getElementById('progress');
  const dotsWrap = document.getElementById('dots');
  const hint = document.getElementById('hint');

  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', () => goTo(i));
    dotsWrap.appendChild(d);
  }
  const dots = dotsWrap.querySelectorAll('.dot');

  function pad(n) { return String(n).padStart(2, '0'); }

  function goTo(idx) {
    if (idx < 0 || idx >= total || idx === current) return;
    const prev = slides[current];
    const next = slides[idx];

    prev.classList.remove('active');
    prev.classList.add('exit-up');

    requestAnimationFrame(() => {
      next.classList.remove('exit-up');
      next.classList.add('active');
    });

    setTimeout(() => {
      prev.classList.remove('exit-up');
    }, 700);

    dots[current].classList.remove('active');
    current = idx;
    dots[current].classList.add('active');
    counter.textContent = pad(current + 1) + ' / ' + pad(total);
    progress.style.width = ((current + 1) / total * 100) + '%';
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === total - 1;
  }

  function next() { goTo(current + 1); }
  function prev() { goTo(current - 1); }

  if (total > 0) {
    slides[0].classList.add('active');
    progress.style.width = (1 / total * 100) + '%';
  }
  prevBtn.disabled = true;
  if (total <= 1) nextBtn.disabled = true;

  prevBtn.addEventListener('click', prev);
  nextBtn.addEventListener('click', next);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); next(); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prev(); }
    if (e.key === 'Home') { e.preventDefault(); goTo(0); }
    if (e.key === 'End') { e.preventDefault(); goTo(total - 1); }
  });

  let touchX = 0, touchY = 0;
  document.addEventListener('touchstart', (e) => {
    touchX = e.changedTouches[0].screenX;
    touchY = e.changedTouches[0].screenY;
  }, { passive: true });
  document.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].screenX - touchX;
    const dy = e.changedTouches[0].screenY - touchY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      dx < 0 ? next() : prev();
    }
  }, { passive: true });

  function hideHint() { hint.classList.add('hidden'); }
  document.addEventListener('keydown', hideHint, { once: true });
  document.addEventListener('click', hideHint, { once: true });
  setTimeout(() => hideHint(), 5000);
})();
</script>

</body>
</html>
