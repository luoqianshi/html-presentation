<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockFrame · 经典封面</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --pink: #FE90E8;
      --blue: #C0F7FE;
      --green: #99E885;
      --yellow: #F7CB46;
      --cream: #FFDC8B;
      --black: #000000;
      --white: #FFFFFF;
      --offwhite: #FFFDF5;
      --border: 4px solid var(--black);
      --shadow: 8px 8px 0px var(--black);
      --shadow-sm: 4px 4px 0px var(--black);
      --radius: 0px;
      --radius-sm: 4px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: var(--offwhite);
      color: var(--black);
    }

    /* Slide container */
    .slides-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: none;
      padding: 60px 10vw;
      overflow: hidden;
    }

    .slide.active {
      display: flex;
    }

    /* Dot grid background pattern */
    .dot-grid {
      background-image: radial-gradient(circle, var(--black) 1.2px, transparent 1.2px);
      background-size: 24px 24px;
    }

    /* Navigation */
    .nav-controls {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      gap: 12px;
      z-index: 1000;
    }

    .nav-btn {
      width: 48px;
      height: 48px;
      border: 3px solid var(--black);
      background: var(--white);
      cursor: pointer;
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 700;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      box-shadow: var(--shadow-sm);
    }

    .nav-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px var(--black);
    }

    .nav-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px var(--black);
    }

    .slide-counter {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 1000;
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 3px solid var(--black);
      background: var(--white);
      padding: 10px 18px;
      box-shadow: var(--shadow-sm);
    }

    /* ============ UTILITY COMPONENTS ============ */

    .nb-card {
      border: var(--border);
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .nb-card-flat {
      border: var(--border);
      background: var(--white);
    }

    .nb-label {
      display: inline-block;
      border: 4px solid var(--black);
      padding: 12px 28px;
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--white);
      box-shadow: var(--shadow-sm);
    }

    .nb-label-pink { background: var(--pink); }
    .nb-label-cream { background: var(--cream); }
    .nb-label-green { background: var(--green); }
    .nb-label-yellow { background: var(--yellow); }
    .nb-label-cream { background: var(--cream); }

    .nb-btn {
      display: inline-block;
      border: 3px solid var(--black);
      padding: 14px 32px;
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 700;
      font-size: 24px;
      text-decoration: none;
      color: var(--black);
      background: var(--yellow);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .nb-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px var(--black);
    }

    .nb-heading-xl {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 900;
      font-size: clamp(48px, 6vw, 96px);
      line-height: 0.95;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .nb-heading-lg {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 800;
      font-size: clamp(32px, 4vw, 64px);
      line-height: 1.0;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    .nb-heading-md {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 700;
      font-size: clamp(24px, 2.5vw, 40px);
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .nb-body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-size: clamp(20px, 1.5vw, 26px);
      line-height: 1.6;
      font-weight: 500;
    }

    .nb-mono {
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-weight: 500;
      font-size: 24px;
      letter-spacing: 0.02em;
    }

    /* Decorative elements */
    .deco-circle {
      border-radius: 50%;
      border: var(--border);
    }

    .deco-square {
      border: var(--border);
    }

    .tilt-left { transform: rotate(-8deg); }
    .tilt-right { transform: rotate(8deg); }

    .corner-bracket {
      position: absolute;
      width: 24px;
      height: 24px;
      border: 3px solid var(--black);
    }
    .corner-bracket.tl { border-right: none; border-bottom: none; top: 0; left: 0; }
    .corner-bracket.tr { border-left: none; border-bottom: none; top: 0; right: 0; }
    .corner-bracket.bl { border-right: none; border-top: none; bottom: 0; left: 0; }
    .corner-bracket.br { border-left: none; border-top: none; bottom: 0; right: 0; }

    /* ============ PROJECT COVER: VIDEO STORYBOARD ============ */
    .slide-project-cover {
      background: var(--offwhite);
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .slide-project-cover .project-cover-frame {
      position: relative;
      width: 100%;
      max-width: 1100px;
      padding: 72px 80px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .slide-project-cover .project-cover-label {
      width: fit-content;
      margin-bottom: 24px;
      background: var(--pink);
      font-size: 20px;
      padding: 12px 26px;
    }
    .nowrap { white-space: nowrap; }

    .slide-project-cover .project-cover-title {
      font-size: clamp(56px, 6vw, 90px);
      line-height: 1.2;
      max-width: 90%;
      text-transform: none;
    }
    .slide-project-cover .project-cover-highlight {
      position: relative;
      display: inline-block;
      z-index: 0;
      background: transparent;
    }
    .slide-project-cover .project-cover-highlight::before {
      content: "";
      position: absolute;
      top: 0.22em;
      bottom: 0.22em;
      left: -0.05em;
      right: -0.05em;
      background: var(--cream);
      transform: rotate(-2deg) skewX(-4deg);
      z-index: -1;
    }
    .slide-project-cover .project-cover-subtitle {
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: clamp(22px, 2vw, 32px);
      font-weight: 600;
      max-width: 800px;
      line-height: 1.7;
    }
    .slide-project-cover .project-cover-badge {
      position: absolute;
      bottom: -22px;
      left: 90px;
      width: 220px;
      height: 50px;
      background: var(--blue);
      border: 4px solid var(--black);
      box-shadow: var(--shadow-sm);
      transform: rotate(-3deg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 18px;
      font-weight: 800;
      z-index: 5;
    }
    /* ============ SLIDE 1: TITLE HERO ============ */
    .slide-1 {
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--cream);
      position: relative;
    }

    .slide-1 .hero-frame {
      position: relative;
      width: 100%;
      max-width: 900px;
      border: var(--border);
      background: var(--offwhite);
      padding: 60px;
      box-shadow: var(--shadow);
    }

    .slide-1 .hero-label {
      margin-bottom: 24px;
    }

    .slide-1 .hero-title {
      margin-bottom: 32px;
    }

    .slide-1 .hero-subtitle {
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 24px;
      font-weight: 500;
      max-width: 500px;
    }

    .slide-1 .deco-pink-rect {
      position: absolute;
      top: -30px;
      right: 80px;
      width: 100px;
      height: 100px;
      background: var(--pink);
      border: var(--border);
      box-shadow: var(--shadow-sm);
      transform: rotate(12deg);
      z-index: 5;
    }

    .slide-1 .deco-green-circle {
      position: absolute;
      bottom: 60px;
      right: 120px;
      width: 60px;
      height: 60px;
      background: var(--green);
      border: var(--border);
      border-radius: 50%;
      z-index: 5;
    }

    .slide-1 .deco-yellow-bar {
      /* Sits as a tab on the bottom edge of the hero-frame, OUTSIDE
         the content area so it never collides with the subtitle. */
      position: absolute;
      bottom: -18px;
      left: 80px;
      width: 220px;
      height: 58px;
      background: var(--yellow);
      border: var(--border);
      box-shadow: var(--shadow-sm);
      transform: rotate(-3deg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 24px;
      font-weight: 800;
      z-index: 5;
    }


    /* ============ SLIDE 2: TWO COLUMN INTRO ============ */
    .slide-2 {
      background: var(--offwhite);
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 56px;
      align-content: center;
      align-items: stretch;
    }
    .slide-2.active {
      display: grid;
    }

    .slide-2 .col-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 28px;
      height: 100%;
    }

    .slide-2 .col-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .slide-2 .intro-card {
      border: var(--border);
      background: var(--white);
      padding: 28px;
      box-shadow: var(--shadow-sm);
    }

    .slide-2 .intro-card h3 {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 700;
      font-size: 24px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .slide-2 .intro-card p {
      font-size: 24px;
      line-height: 1.6;
      font-weight: 500;
    }

    .slide-2 .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: auto;
      align-self: flex-start;
      border: 3px solid var(--black);
      padding: 10px 20px;
      background: var(--yellow);
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 17px;
      font-weight: 600;
    }

    /* ============ SLIDE 3: THREE FEATURE CARDS ============ */
    .slide-3 {
      background: var(--cream);
      flex-direction: column;
      justify-content: center;
    }

    .slide-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 36px;
    }
    .slide-header .nb-heading-lg {
      margin-top: 0 !important;
    }
    .slide-3 .slide-header {
      margin-bottom: 48px;
    }

    .slide-3 .cards-row {
      display: flex;
      gap: 32px;
      width: 100%;
    }

    .slide-3 .feature-card {
      flex: 1;
      border: var(--border);
      background: var(--white);
      padding: 36px;
      box-shadow: var(--shadow);
      position: relative;
    }

    .slide-3 .feature-icon {
      width: 64px;
      height: 64px;
      border: 3px solid var(--black);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
    }

    .slide-3 .icon-pink { background: var(--pink); }
    .slide-3 .icon-cream { background: var(--cream); }
    .slide-3 .icon-green { background: var(--green); }

    .slide-3 .feature-card h3 {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 700;
      font-size: 24px;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    .slide-3 .feature-card p {
      font-size: 24px;
      line-height: 1.6;
      font-weight: 500;
    }

    .slide-3 .card-deco {
      position: absolute;
      top: -12px;
      right: 24px;
      width: 48px;
      height: 48px;
      border: 3px solid var(--black);
      background: var(--yellow);
    }

    /* ============ SLIDE 4: CHART / DATA ============ */
    .slide-4 {
      background: var(--cream);
      flex-direction: column;
      justify-content: center;
      gap: 48px;
      /* Reserve space for the shadow + the bottom-fixed nav chrome
         so the chart-frame never butts up against the slide edge. */
      padding-bottom: 110px;
    }

    .slide-4 .slide-header {
      flex-shrink: 0;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .slide-4 .chart-frame {
      border: var(--border);
      background: var(--white);
      box-shadow: var(--shadow);
      padding: 32px 40px;
      width: calc(100% - 16px);
      max-width: 1200px;
      margin: 0 auto;
      /* Cap the frame so it always fits inside the slide content area
         (slide is 100vh - 60 top - 110 bottom = ~70vh available). */
      max-height: 62vh;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow: hidden;
    }

    .slide-4 .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-shrink: 0;
    }

    .slide-4 .chart-legend {
      display: flex;
      gap: 16px;
    }

    .slide-4 .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 17px;
      font-weight: 600;
    }

    .slide-4 .legend-swatch {
      width: 16px;
      height: 16px;
      border: 2px solid var(--black);
    }

    /* Chart body — chart on the left, stat boxes stacked on the right.
       This is a flex row that fills the remaining space below the header. */
    .slide-4 .chart-body {
      display: flex;
      gap: 32px;
      flex: 1 1 auto;
      min-height: 0;
      align-items: stretch;
      width: 100%;
    }

    /* SVG Chart — fills the left side of chart-body. Width auto-derives
       from viewBox aspect; flex-1 lets it claim available width. */
    .chart-svg {
      display: block;
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
    }

    /* Data column — vertical stack of stat boxes on the right. */
    .slide-4 .data-column {
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 0 0 240px;
      width: 240px;
      min-width: 0;
    }

    .slide-4 .data-box {
      flex: 1 1 0;
      min-height: 0;
      border: 3px solid var(--black);
      background: var(--cream);
      padding: 18px 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    .slide-4 .data-box .data-num {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 900;
      font-size: 36px;
      display: block;
      margin-bottom: 4px;
    }

    .slide-4 .data-box .data-label {
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 17px;
      font-weight: 600;
      text-transform: uppercase;
    }

    /* ============ SLIDE 5: BIG STATEMENT / QUOTE ============ */
    .slide-5 {
      background: var(--offwhite);
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
    }

    .slide-5 .quote-frame {
      border: var(--border);
      background: var(--white);
      padding: 60px 80px;
      box-shadow: var(--shadow);
      max-width: 1000px;
      position: relative;
    }

    .slide-5 .quote-text {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 900;
      font-size: clamp(28px, 3.5vw, 52px);
      line-height: 1.15;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .slide-5 .quote-author {
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .slide-5 .deco-quote-marks {
      position: absolute;
      top: -30px;
      left: 40px;
      font-size: 120px;
      font-weight: 900;
      line-height: 1;
      color: var(--cream);
      -webkit-text-stroke: 3px var(--black);
    }


    /* ============ SLIDE 6: SPLIT IMAGE + TEXT ============ */
    .slide-6 {
      background: var(--cream);
      flex-direction: row;
      gap: 0;
      padding: 0;
    }

    .slide-6 .split-visual {
      flex: 1;
      background: var(--black);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 72px 8vw 72px 10vw;
      position: relative;
      overflow: hidden;
    }

    .slide-6 .split-visual .visual-box {
      width: min(64vh, 82%);
      max-width: 440px;
      aspect-ratio: 1;
      border: 4px solid var(--white);
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .slide-6 .split-visual .visual-box::after {
      content: '';
      position: absolute;
      top: 20px;
      left: 20px;
      width: 100%;
      height: 100%;
      background: var(--cream);
      border: 4px solid var(--white);
      z-index: -1;
    }

    .slide-6 .split-visual .visual-label {
      position: absolute;
      top: 56px;
      left: 10vw;
      border: 4px solid var(--white);
      background: var(--cream);
      color: var(--black);
      padding: 18px 34px;
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 28px;
      font-weight: 800;
      transform: rotate(-4deg);
    }

    .slide-6 .split-content {
      flex: 1;
      padding: 72px 10vw 72px 6vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 34px;
      background: var(--offwhite);
      border-left: var(--border);
    }

    .slide-6 .split-content > * {
      max-width: 720px;
    }

    .slide-6 .content-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .slide-6 .content-list li {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      font-size: 24px;
      line-height: 1.5;
      font-weight: 500;
    }

    .slide-6 .content-list .list-num {
      flex-shrink: 0;
      width: 46px;
      height: 46px;
      border: 3px solid var(--black);
      background: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-weight: 700;
      font-size: 20px;
    }

    /* ============ SLIDE 7: TIMELINE / PROCESS ============ */
    .slide-7 {
      background: var(--offwhite);
      flex-direction: column;
      justify-content: center;
    }

    .slide-7 .slide-header {
      margin-bottom: 48px;
    }

    .slide-7 .timeline {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 38px;
      width: 100%;
      position: relative;
      padding-top: 22px;
    }


    .slide-7 .timeline-step {
      border: var(--border);
      background: var(--white);
      padding: 34px 28px 30px;
      box-shadow: var(--shadow-sm);
      position: relative;
      min-height: 280px;
      z-index: 1;
    }


    .slide-7 .timeline-step:first-child {
      background: var(--cream);
    }

    .slide-7 .timeline-step:nth-child(2) {
      background: var(--cream);
    }

    .slide-7 .timeline-step:nth-child(3) {
      background: var(--cream);
    }

    .slide-7 .timeline-step:nth-child(4) {
      background: var(--cream);
    }

    .slide-7 .timeline-step::before {
      content: '';
      position: absolute;
      top: -27px;
      left: 50%;
      width: 34px;
      height: 34px;
      border: var(--border);
      border-radius: 50%;
      background: var(--offwhite);
      box-shadow: 5px 5px 0 var(--black);
      transform: translateX(-50%);
    }

    .slide-7 .step-num {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 900;
      font-size: 54px;
      line-height: 1;
      margin-bottom: 18px;
      opacity: 0.6;
      text-align: center;
    }

    .slide-7 .step-title {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 700;
      font-size: 24px;
      text-transform: uppercase;
      margin-bottom: 10px;
      text-align: center;
    }

    .slide-7 .step-desc {
      font-size: 17px;
      line-height: 1.5;
      font-weight: 500;
    }


    /* ============ SLIDE 8: STATISTICS / NUMBERS ============ */
    .slide-8 {
      background: var(--cream);
      flex-direction: column;
