<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purple Gold Presentation · 经典封面</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #08090d;
      --bg-cover: #070609;
      --primary: #b98eff;
      --accent-gold: #ffc402;
      --text: #f6f2e8;
      --text-muted: #aaa59a;
      --text-light: #746f66;
      --accent-light: rgba(185, 142, 255, 0.10);
      --accent-medium: rgba(185, 142, 255, 0.18);
      --border: rgba(255, 255, 255, 0.16);
      --card-bg: rgba(255, 255, 255, 0.055);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans SC', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* Slide container */
    .deck {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      /* Asymmetric padding: extra bottom space to clear the fixed
         slide-counter (left) and nav-controls (right). Without this,
         cards/grids that fill slide-content overlap the nav chrome. */
      padding: 5.5vw 5.5vw 8vh 5.5vw;
      opacity: 0;
      pointer-events: none;
      transform: translateX(40px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      overflow: hidden;
    }

    .slide.active {
      opacity: 1;
      pointer-events: all;
      transform: translateX(0);
      z-index: 10;
    }

    .slide.prev {
      transform: translateX(-40px);
    }

    /* Typography */
    h1, h2, h3, h4 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    h1 {
      font-size: clamp(4.5rem, 7vw, 7rem);
      font-weight: 700;
    }

    h2 {
      font-size: clamp(2.8rem, 4.2vw, 3.8rem);
      margin-bottom: 2.5rem;
      color: var(--primary);
    }

    .layout-cover h1 {
      color: var(--text);
    }

    h3 {
      font-size: clamp(1.6rem, 2.2vw, 2rem);
      font-weight: 500;
      line-height: 1.3;
    }

    h4 {
      font-size: clamp(1rem, 1.4vw, 1.25rem);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--primary);
    }

    p, li {
      font-size: clamp(1.35rem, 1.75vw, 1.7rem);
      line-height: 1.7;
      color: var(--text-muted);
    }

    /* Slide header bar */
    .slide-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3.5vh;
      flex-shrink: 0;
    }

    .slide-header h4 {
      margin: 0;
    }

    .slide-header .tag {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--primary);
      background: var(--accent-light);
      padding: 0.55rem 1.35rem;
      border-radius: 100px;
    }

    /* Slide content area */
    .slide-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }

    /* Navigation */
    .nav-controls {
      position: fixed;
      bottom: 2.5vh;
      right: 3vw;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      z-index: 100;
    }

    .nav-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      font-size: 1.1rem;
    }

    .nav-btn:hover {
      background: var(--primary);
      color: var(--bg);
      border-color: var(--primary);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .slide-counter {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      position: fixed;
      bottom: 2.5vh;
      left: 3vw;
      z-index: 100;
    }

    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: var(--primary);
      transition: width 0.4s ease;
      z-index: 100;
    }

    /* Decorative elements */
    .accent-line {
      width: 80px;
      height: 6px;
      background: var(--accent-gold);
      border-radius: 3px;
      margin-bottom: 2rem;
    }

    .accent-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-gold);
      border-radius: 2px;
      display: inline-block;
    }

    .highlight-mark {
      background: linear-gradient(180deg, transparent 28%, #ffc402 28%);
      color: var(--text);
      padding: 0 0.35rem;
      border-radius: 4px;
      font-weight: 700;
    }

    .text-gray { color: rgba(255, 255, 255, 0.3); }
    .text-purple { color: var(--primary); }
    .text-yellow { color: var(--accent-gold); }

    .strikethrough {
      position: relative;
      display: inline-block;
    }
    .strikethrough::after {
      content: '';
      position: absolute;
      left: -2px;
      right: -2px;
      top: 50%;
      height: 3px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      transform: translateY(-50%) rotate(-3deg);
    }

    /* ============================================================
       LAYOUT 1: Cover / Title Slide
       ============================================================ */
    .layout-cover {
      justify-content: center;
      align-items: center;
      padding: 48px 60px;
      background: var(--bg-cover);
      font-family: 'Noto Sans SC', 'Inter', sans-serif;
    }

    .layout-cover .cover-content {
      width: 88%;
      max-width: 1200px;
      margin: 0 auto;
      text-align: left;
    }

    .layout-cover .cover-title-wrap {
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      gap: 2vw;
      margin-bottom: 44px;
    }

    .layout-cover .cover-titles {
      flex: 0 1 auto;
    }

    .layout-cover .cover-character {
      flex: 0 0 auto;
      width: auto;
      height: auto;
      max-height: 36vh;
      max-width: 18vw;
      object-fit: contain;
      transform: translateY(-1.5vh);
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
    }

    .layout-cover .cover-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      margin-bottom: 48px;
      padding: 12px 24px;
      border: 1px solid rgba(185, 142, 255, 0.18);
      border-radius: 100px;
      background: rgba(185, 142, 255, 0.10);
      color: rgba(255, 255, 255, 0.85);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .layout-cover .cover-dot-yellow {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-gold);
      flex-shrink: 0;
    }

    .layout-cover .cover-dot-muted {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      flex-shrink: 0;
    }

    .layout-cover .cover-title-row,
    .layout-cover .cover-title-row-2 {
      margin: 0;
      font-family: 'Noto Sans SC', 'Inter', sans-serif;
      font-size: clamp(4.8rem, 9.5vw, 7.5rem);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .layout-cover .cover-title-row {
      margin-bottom: 12px;
    }

    .layout-cover .cover-title-row-2 {
      margin-bottom: 44px;
    }

    .layout-cover .cover-gray {
      color: rgba(255, 255, 255, 0.3);
    }

    .layout-cover .cover-purple {
      color: var(--primary);
    }

    .layout-cover .cover-yellow {
      color: var(--accent-gold);
    }

    .layout-cover .cover-strike {
      position: relative;
      display: inline-block;
    }

    .layout-cover .cover-strike::after {
      content: '';
      position: absolute;
      left: -2px;
      right: -2px;
      top: 50%;
      height: 3px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      transform: translateY(-50%) rotate(-3deg);
    }

    .layout-cover .cover-subtitle {
      margin: 0 0 20px;
      color: rgba(255, 255, 255, 0.5);
      font-size: clamp(1.7rem, 3vw, 2.4rem);
      font-weight: 300;
      line-height: 1.7;
    }

    .layout-cover .cover-bottom-line {
      margin: 0;
      color: rgba(255, 255, 255, 0.5);
      font-size: clamp(1.7rem, 3vw, 2.4rem);
      font-weight: 500;
      line-height: 1.6;
    }
/* ============================================================
       LAYOUT 2: Agenda / 目录
       ============================================================ */
    .layout-agenda .agenda-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 1rem 3rem;
      margin-top: 1rem;
      flex: 1;
      min-height: 0;
    }

    .agenda-item {
      display: flex;
      gap: 1.2rem;
      align-items: center;
      padding: 1rem 1.2rem;
      border-radius: 12px;
      transition: background 0.2s ease;
      border-bottom: 1px solid var(--border);
    }

    .agenda-item:hover {
      background: var(--card-bg);
    }

    .agenda-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
      min-width: 36px;
    }

    .agenda-item h3 {
      margin-bottom: 0.3rem;
      font-size: clamp(1.6rem, 2.2vw, 2rem);
    }

    .agenda-item p {
      font-size: clamp(1.2rem, 1.55vw, 1.45rem);
      line-height: 1.5;
    }

    /* ============================================================
       LAYOUT 3: Key Metrics (3 large callouts)
       Cards size to their content; the row centers vertically
       inside the remaining slide-content area.
       ============================================================ */
    .layout-metrics .slide-content {
      justify-content: center;
    }

    .layout-metrics .metrics-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2.2rem;
      margin-top: 0.5rem;
      align-items: stretch;
    }

    .metric-card {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 2rem 2.2rem;
      border-radius: 18px;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
    }

    .metric-card .metric-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3.2rem, 4.8vw, 4.5rem);
      font-weight: 700;
      color: var(--accent-gold);
      line-height: 1;
    }

    .metric-card .metric-label {
      font-size: clamp(1.3rem, 1.8vw, 1.6rem);
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .metric-card .metric-desc {
      font-size: clamp(1.05rem, 1.35vw, 1.3rem);
      color: var(--text-muted);
      line-height: 1.55;
    }

    .metric-card .metric-supports {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin: 0.3rem 0 0;
      padding: 1rem 0 0;
      border-top: 1px solid var(--border);
    }

    .metric-card .metric-supports li {
      font-size: clamp(1rem, 1.25vw, 1.2rem);
      color: var(--text-muted);
      padding-left: 1.2rem;
      position: relative;
      line-height: 1.5;
    }

    .metric-card .metric-supports li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--text-light);
    }

    .metric-card .metric-change {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      margin-top: 0.4rem;
    }

    .metric-change.positive { color: var(--accent-gold); }
    .metric-change.negative { color: var(--primary); }

    /* ============================================================
       LAYOUT 4: Data Dashboard (6 stat grid)
       Cells have natural height with stat at top + name + small
       context line. Grid is auto-sized; the row stays in the upper
       portion of slide-content with the bottom-padding reserved
       for nav chrome.
       ============================================================ */
    .layout-dashboard .slide-content {
      justify-content: center;
    }

    .layout-dashboard .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
      margin-top: 0.5rem;
    }

    .stat-cell {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      padding: 2rem 2.2rem;
      border-radius: 18px;
      background: var(--card-bg);
      border: 1px solid var(--border);
    }

    .stat-cell .stat-top {
      display: flex;
      align-items: baseline;
      gap: 0.7rem;
    }

    .stat-cell .stat-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.8rem, 4vw, 3.5rem);
      font-weight: 700;
      color: var(--accent-gold);
      line-height: 1;
    }

    .stat-cell .stat-unit {
      font-size: 1.3rem;
      color: var(--text-light);
      font-weight: 500;
    }

    .stat-cell .stat-name {
      font-size: clamp(1.35rem, 1.8vw, 1.7rem);
      color: var(--text);
      line-height: 1.4;
      font-weight: 600;
    }

    .stat-cell .stat-context {
      font-size: 1.15rem;
      color: var(--text-light);
      line-height: 1.55;
      padding-top: 0.8rem;
      border-top: 1px solid var(--border);
    }

    /* ============================================================
       LAYOUT 5: Two Column Split
       Left = numbered insight list, Right = pull-quote + supporting
       stats. Both columns size to their content with natural rhythm
       (gap-based spacing, no forced height-distribution).
       ============================================================ */
    .layout-split .slide-content {
      justify-content: center;
    }

    .layout-split .split-body {
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 4.5rem;
      margin-top: 0.5rem;
    }

    .split-left, .split-right {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .split-right {
      padding-left: 3.5rem;
      border-left: 2px solid var(--border);
    }

    .insight-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      margin: 0;
      counter-reset: insight;
    }

    .insight-list li {
      position: relative;
      padding-left: 4.2rem;
      font-size: clamp(1.55rem, 2vw, 2.1rem);
      color: var(--text);
      line-height: 1.65;
      counter-increment: insight;
    }

    .insight-list li::before {
      content: counter(insight, decimal-leading-zero);
      position: absolute;
      left: 0;
      top: 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 0.02em;
      line-height: 1.55;
    }

    .split-highlight {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.7rem, 2.2vw, 2.1rem);
      font-weight: 500;
      color: var(--text);
      line-height: 1.55;
      padding: 1.8rem 2rem;
      background: var(--accent-light);
      border-radius: 18px;
      border-left: 5px solid var(--primary);
    }

    .split-highlight cite {
      display: block;
      margin-top: 1rem;
      font-style: normal;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .mini-stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
      padding-top: 0.6rem;
    }

    .mini-stat {
      padding: 1.2rem 1.4rem;
      border-radius: 14px;
      background: var(--card-bg);
      border: 1px solid var(--border);
    }

    .mini-stat .mini-val {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-gold);
      line-height: 1;
    }

    .mini-stat .mini-label {
      font-size: 1rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      line-height: 1.4;
    }

    /* ============================================================
       LAYOUT 6: Horizontal Bar 排名
       ============================================================ */
    .layout-bars .bars-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.2rem;
      margin-top: 0.5rem;
    }

    .bar-item {
      display: grid;
      grid-template-columns: minmax(220px, 30%) 1fr auto;
      align-items: center;
      gap: 1.4rem;
      padding: 0.8rem 0;
    }

    .bar-label {
      font-size: clamp(1.2rem, 1.6vw, 1.5rem);
      color: var(--text);
      font-weight: 500;
      line-height: 1.4;
    }

    .bar-track {
      height: 36px;
      background: var(--accent-light);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      background: var(--accent-gold);
      border-radius: 8px;
      transition: width 0.8s ease;
    }

    .bar-pct {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--primary);
      min-width: 60px;
      text-align: right;
    }

    .bar-note {
      font-size: 1.05rem;
      color: var(--text-light);
      margin-top: 0.3rem;
    }

    /* ============================================================
       LAYOUT 7: Quote / Highlight
       ============================================================ */
    .layout-quote {
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .layout-quote .quote-mark {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 8rem;
      font-weight: 700;
      color: var(--accent-gold);
      opacity: 0.35;
      line-height: 0.5;
      margin-bottom: 1rem;
    }

    .layout-quote blockquote {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.4rem, 3.6vw, 3.5rem);
      font-weight: 500;
      line-height: 1.45;
      color: var(--text);
      max-width: 65vw;
      margin-bottom: 2.5rem;
    }

    .layout-quote .quote-source {
      font-size: clamp(1.2rem, 1.6vw, 1.5rem);
      color: var(--text-muted);
    }

    .layout-quote .quote-source strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ============================================================
       LAYOUT 8: Timeline / 流程 Flow
       ============================================================ */
    .layout-timeline .timeline-track {
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      flex: 1;
      align-items: center;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .timeline-step {
      width: 100%;
      max-width: 62vw;
      display: flex;
      flex-direction: row;
      align-items: center;
      text-align: left;
      position: relative;
      gap: 1.6rem;
      padding: 1.3rem 1.8rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .timeline-step:not(:last-child)::after {
      content: '';
      position: absolute;
      bottom: -1.1rem;
      left: 50%;
      transform: translateX(-50%);
      width: 2.4rem;
      height: 3px;
      background: rgba(255, 255, 255, 0.22);
    }

    .step-circle {
      width: 3.6rem;
      height: 3.6rem;
      border-radius: 10px;
      background: var(--accent-gold);
      color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
      padding-top: 0.1em;
      flex-shrink: 0;
    }

    .timeline-step:nth-child(2) .step-circle { opacity: 0.92; }
    .timeline-step:nth-child(3) .step-circle { opacity: 0.84; }
    .timeline-step:nth-child(4) .step-circle { opacity: 0.76; }

    .step-body {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .step-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.4rem, 2vw, 1.85rem);
      font-weight: 600;
      color: var(--text);
    }

    .step-desc {
      font-size: clamp(1.05rem, 1.45vw, 1.3rem);
      color: var(--text-muted);
      line-height: 1.55;
    }

    /* ============================================================
       LAYOUT 9: Detailed 分析 (bullets with sub-items)
       ============================================================ */
    .layout-detail .detail-body {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2.5rem 4rem;
      flex: 1;
      margin-top: 0.5rem;
      align-content: center;
      overflow: hidden;
    }

    .detail-col {
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }

    .detail-block {
      padding: 1.6rem 1.8rem;
      border-radius: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
    }
