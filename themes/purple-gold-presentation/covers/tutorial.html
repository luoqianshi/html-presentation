<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purple Gold Presentation · 教程风封面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070609;
      --primary: #b98eff;
      --accent-gold: #ffc402;
      --text: #f6f2e8;
      --text-muted: #aaa59a;
      --card-bg: rgba(255, 255, 255, 0.055);
      --border: rgba(255, 255, 255, 0.16);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans SC', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .cover-slide {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4vw;
      overflow: hidden;
    }

    /* subtle radial glow */
    .cover-slide::before {
      content: '';
      position: absolute;
      top: -20vh;
      right: -10vw;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(185,142,255,0.10) 0%, rgba(7,6,9,0) 60%);
      pointer-events: none;
    }

    .illustration {
      flex: 0 0 30vw;
      height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      position: relative;
      z-index: 1;
    }

    .illustration .category {
      margin-bottom: 0;
      flex-shrink: 0;
    }

    .illustration img {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 58vh;
      object-fit: contain;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
    }

    .content {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 2vw;
      max-width: 52vw;
      transform: translateY(-3vh);
      position: relative;
      z-index: 1;
    }

    .category {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      width: fit-content;
      padding: 0.55rem 1.1rem;
      margin-bottom: 2.2rem;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 100px;
      font-size: clamp(0.9rem, 1.1vw, 1.15rem);
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .category::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-gold);
      box-shadow: 0 0 10px var(--accent-gold);
    }

    h1 {
      font-family: 'Noto Sans SC', 'Inter', sans-serif;
      font-size: clamp(3.2rem, 5.2vw, 6rem);
      font-weight: 900;
      line-height: 1.18;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 1.6rem;
    }

    .gradient-purple {
      background: linear-gradient(135deg, #d4b3ff 0%, #b98eff 50%, #9b6dff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .gradient-gold {
      background: linear-gradient(135deg, #ffe066 0%, #ffc402 50%, #ff9d00 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: clamp(1.15rem, 1.55vw, 1.5rem);
      line-height: 1.7;
      color: var(--text-muted);
      max-width: 42vw;
      margin-bottom: 3rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .tag {
      padding: 0.55rem 1.15rem;
      border-radius: 100px;
      font-size: clamp(0.85rem, 1vw, 1rem);
      font-weight: 500;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.14);
      transition: all 0.2s ease;
    }

    .tag:hover {
      background: rgba(185, 142, 255, 0.12);
      border-color: rgba(185, 142, 255, 0.35);
    }

    .tag.accent {
      background: rgba(185, 142, 255, 0.12);
      border-color: rgba(185, 142, 255, 0.3);
    }

    @media (max-width: 1100px) {
      .cover-slide { flex-direction: column; padding: 6vh 6vw; }
      .illustration { flex: 0 0 30vh; width: 100%; gap: 0.8rem; }
      .illustration img { max-height: 22vh; }
      .content { padding-left: 0; text-align: center; align-items: center; }
      .subtitle { max-width: 80vw; }
      .tags { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="cover-slide">
    <div class="illustration" aria-hidden="true">
      <div class="cover-category category">AI 创作 · 实战教程</div>
      <img src="character.png" alt="卡通人物指向右侧">
    </div>

    <div class="content">
      <h1 class="cover-title">
        手把手教你打造<br>
        <span class="gradient-purple">专属动漫</span>
        <span class="gradient-gold">IP 分身</span>
      </h1>
      <p class="cover-subtitle subtitle">用 AI 生成属于你自己的卡通形象，建立个人品牌符号</p>
      <div class="cover-tags tags">
        <span class="tag accent">AI 生图</span>
        <span class="tag">插画风格</span>
        <span class="tag">个人 IP</span>
        <span class="tag">零基础友好</span>
      </div>
    </div>
  </div>
</body>
</html>
