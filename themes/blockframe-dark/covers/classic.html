<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockFrame Dark · 经典封面</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --pink: #FE90E8;
      --blue: #C0F7FE;
      --green: #99E885;
      --yellow: #F7CB46;
      --cream: #FFDC8B;
      --black: #0a0a0a;
      --card: #141414;
      --card-elevated: #1c1c1c;
      --white: #f6f6f6;
      --muted: #a0a0a0;
      --border-color: #f6f6f6;
      --border: 4px solid var(--border-color);
      --shadow: 8px 8px 0px var(--yellow);
      --shadow-sm: 4px 4px 0px var(--yellow);
      --glow-pink: 0 0 24px rgba(254, 144, 232, 0.35);
      --glow-blue: 0 0 24px rgba(192, 247, 254, 0.30);
      --glow-green: 0 0 24px rgba(153, 232, 133, 0.30);
      --glow-yellow: 0 0 24px rgba(247, 203, 70, 0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%; overflow: hidden;
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: var(--black); color: var(--white);
    }

    .slides-container { position: relative; width: 100vw; height: 100vh; }

    .slide {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: none; padding: 56px 10vw;
      overflow: hidden;
    }
    .slide.active { display: flex; }

    /* Utility */
    .nb-label {
      display: inline-block; border: 4px solid var(--border-color);
      padding: 12px 28px; font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 22px; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase; background: var(--card);
      box-shadow: var(--shadow-sm); color: var(--white);
    }
    .nb-label-pink { background: var(--pink); color: var(--black); }
    .nb-label-green { background: var(--green); color: var(--black); }
    .nb-label-yellow { background: var(--yellow); color: var(--black); }
    .nb-label-cream { background: var(--cream); color: var(--black); }
    .nb-label-blue { background: var(--blue); color: var(--black); }

    .nb-btn {
      display: inline-block; border: 3px solid var(--border-color);
      padding: 14px 32px; font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 700; font-size: 20px; text-decoration: none;
      color: var(--black); background: var(--yellow);
      box-shadow: var(--shadow-sm); cursor: pointer; transition: all 0.15s ease;
    }
    .nb-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--yellow); }
    .nb-card {
      border: var(--border); background: var(--card);
      box-shadow: var(--shadow);
    }
    .nb-card-flat {
      border: var(--border); background: var(--card);
    }

    .nb-heading-xl {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 900; font-size: clamp(44px, 5.5vw, 84px);
      line-height: 1.05; letter-spacing: -0.03em;
      color: var(--white);
    }
    .nb-heading-lg {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 800; font-size: clamp(32px, 4vw, 60px);
      line-height: 1.1; letter-spacing: -0.02em;
      color: var(--white);
    }
    .nb-heading-md {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 700; font-size: clamp(22px, 2.4vw, 38px);
      line-height: 1.2; color: var(--white);
    }
    .nb-body {
      font-size: clamp(20px, 1.7vw, 28px);
      line-height: 1.65; font-weight: 500; color: var(--muted);
    }
    .nb-mono {
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-weight: 600; font-size: 22px; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--white);
    }

    .corner-bracket {
      position: absolute; width: 28px; height: 28px;
      border: 4px solid var(--border-color);
    }
    .corner-bracket.tl { border-right: none; border-bottom: none; top: 0; left: 0; }
    .corner-bracket.tr { border-left: none; border-bottom: none; top: 0; right: 0; }
    .corner-bracket.bl { border-right: none; border-top: none; bottom: 0; left: 0; }
    .corner-bracket.br { border-left: none; border-top: none; bottom: 0; right: 0; }

    .nav-controls {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; gap: 12px; z-index: 1000;
    }
    .nav-btn {
      width: 48px; height: 48px; border: 3px solid var(--border-color);
      background: var(--card); cursor: pointer; color: var(--white);
      font-weight: 700; font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-sm); transition: all 0.15s ease;
    }
    .nav-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--yellow); }
    .slide-counter {
      position: fixed; bottom: 24px; left: 24px; z-index: 1000;
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-weight: 700; font-size: 17px; letter-spacing: 0.1em;
      text-transform: uppercase; border: 3px solid var(--border-color);
      background: var(--card); color: var(--white); padding: 10px 18px;
      box-shadow: var(--shadow-sm);
    }

    /* PROJECT COVER: VIDEO STORYBOARD */
    .slide-project-cover {
      background: var(--black);
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .slide-project-cover .project-cover-frame {
      position: relative;
      width: 100%;
      max-width: 1100px;
      background: var(--black);
      padding: 72px 80px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .slide-project-cover .project-cover-label {
      width: fit-content;
      margin-bottom: 24px;
      background: var(--blue);
      color: var(--black);
      font-size: 20px;
      padding: 12px 26px;
    }
    .slide-project-cover .project-cover-title {
      font-size: clamp(52px, 6vw, 96px);
      line-height: 1.2;
      color: var(--white);
      text-transform: none;
    }
    .slide-project-cover .project-cover-title .text-yellow {
      color: var(--yellow);
    }
    .slide-project-cover .project-cover-highlight {
      position: relative;
      display: inline-block;
      z-index: 0;
      background: transparent;
      color: var(--black);
    }
    .slide-project-cover .project-cover-highlight::before {
      content: "";
      position: absolute;
      top: 0.05em;
      bottom: 0.05em;
      left: -0.1em;
      right: -0.1em;
      background: #c4b5fd;
      transform: rotate(-2deg) skewX(-4deg);
      z-index: -1;
    }
    .slide-project-cover .project-cover-subtitle {
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: clamp(22px, 2vw, 32px);
      font-weight: 600;
      max-width: 800px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.9);
    }
    .slide-project-cover .project-cover-circle {
      position: absolute;
      bottom: 70px;
      right: 140px;
      width: 64px;
      height: 64px;
      background: var(--green);
      border: var(--border);
      border-radius: 50%;
      z-index: 5;
      box-shadow: var(--glow-green);
    }
    .slide-project-cover .project-cover-character {
      position: absolute;
      top: 74%;
      right: 3vw;
      width: 260px;
      height: auto;
      transform: none;
      z-index: 6;
      filter: drop-shadow(0 16px 32px rgba(0,0,0,0.5));
      pointer-events: none;
    }
    .slide-project-cover .project-cover-badge {
      position: absolute;
      bottom: -18px;
      left: 90px;
      width: 220px;
      height: 50px;
      background: var(--pink);
      border: var(--border);
      box-shadow: var(--shadow-sm);
      transform: rotate(-3deg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 18px;
      font-weight: 800;
      color: var(--black);
      z-index: 5;
    }
    /* SLIDE 1: Title Hero */
    .slide-1 {
      background: var(--black);
      flex-direction: column; justify-content: center; align-items: center;
    }
    .slide-1 .hero-frame {
      position: relative; width: 100%; max-width: 980px;
      border: var(--border); background: var(--card);
      padding: 64px 72px; box-shadow: var(--shadow);
    }
    .slide-1 .hero-label { margin-bottom: 28px; }
    .slide-1 .hero-title { margin-bottom: 28px; }
    .slide-1 .hero-subtitle {
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: clamp(20px, 1.7vw, 28px); font-weight: 600;
      max-width: 580px; line-height: 1.6; color: var(--muted);
    }
    .slide-1 .deco-pink-rect {
      position: absolute; top: -28px; right: 90px;
      width: 110px; height: 110px; background: var(--pink);
      border: var(--border); box-shadow: var(--glow-pink);
      transform: rotate(12deg); z-index: 5;
    }
    .slide-1 .deco-green-circle {
      position: absolute; bottom: 70px; right: 140px;
      width: 64px; height: 64px; background: var(--green);
      border: var(--border); border-radius: 50%; z-index: 5;
      box-shadow: var(--glow-green);
    }
    .slide-1 .deco-yellow-bar {
      position: absolute; bottom: -28px; left: 90px; width: 230px; height: 60px;
      background: var(--yellow); border: var(--border); box-shadow: var(--glow-yellow);
      transform: rotate(-3deg); display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace; font-size: 20px; font-weight: 800;
      color: var(--black); z-index: 5;
    }

    /* SLIDE 2: Two Column Intro */
    .slide-2 {
      background: var(--black);
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 56px;
      align-content: center;
      align-items: stretch;
    }
    .slide-2.active {
      display: grid;
    }
    .slide-2 .col-left {
      flex: 1; display: flex; flex-direction: column; gap: 28px;
      height: 100%;
    }
    .slide-2 .col-right {
      flex: 1; display: flex; flex-direction: column; gap: 22px;
    }
    .slide-2 .intro-card {
      border: var(--border); background: var(--card);
      padding: 34px; box-shadow: var(--shadow-sm);
    }
    .slide-2 .intro-card h3 {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 800; font-size: clamp(22px, 1.9vw, 30px);
      margin-bottom: 12px; text-transform: uppercase; color: var(--white);
    }
    .slide-2 .intro-card p {
      font-size: clamp(21px, 1.8vw, 28px); line-height: 1.6; font-weight: 500;
      color: var(--muted);
    }
    .slide-2 .stat-pill {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: auto;
      align-self: flex-start;
      border: 3px solid var(--border-color); padding: 10px 20px;
      background: var(--yellow); font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 17px; font-weight: 700; color: var(--black);
    }

    /* SLIDE 3: Three Feature Cards */
    .slide-3 {
      background: var(--black);
      flex-direction: column; justify-content: center;
    }
    .slide-header { display: flex; flex-direction: column; align-items: flex-start; gap: 36px; }
    .slide-header .nb-heading-lg { margin-top: 0 !important; }
    .slide-3 .slide-header { margin-bottom: 48px; }
    .slide-3 .cards-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; width: 100%;
    }
    .slide-3 .feature-card {
      border: var(--border); background: var(--card);
      padding: 36px; box-shadow: var(--shadow); position: relative;
      display: flex; flex-direction: column; gap: 18px;
    }
    .slide-3 .feature-icon {
      width: 64px; height: 64px; border: 3px solid var(--border-color);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 900; color: var(--black);
    }
    .slide-3 .feature-card h3 {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 800; font-size: clamp(20px, 1.8vw, 28px);
      text-transform: uppercase; color: var(--white);
    }
    .slide-3 .feature-card p {
      font-size: clamp(20px, 1.7vw, 26px); line-height: 1.55; font-weight: 500;
      color: var(--muted);
    }
    .slide-3 .card-deco {
      position: absolute; top: -12px; right: 24px;
      width: 48px; height: 48px; border: 3px solid var(--border-color); background: var(--yellow);
    }

    /* SLIDE 4: Chart / Data */
    .slide-4 {
      background: var(--black);
      flex-direction: column; justify-content: center; gap: 48px;
      padding-bottom: 110px;
    }
    .slide-4 .slide-header {
      flex-shrink: 0; width: 100%; max-width: 1200px; margin: 0 auto;
    }
    .slide-4 .chart-frame {
      border: var(--border); background: var(--card);
      box-shadow: var(--shadow); padding: 32px 40px;
      width: calc(100% - 16px); max-width: 1200px; margin: 0 auto;
      max-height: 62vh; display: flex; flex-direction: column; gap: 20px;
      overflow: hidden;
    }
    .slide-4 .chart-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      flex-shrink: 0;
    }
    .slide-4 .chart-legend { display: flex; gap: 16px; }
    .slide-4 .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 17px; font-weight: 600; color: var(--white);
    }
    .slide-4 .legend-swatch {
      width: 16px; height: 16px; border: 2px solid var(--border-color);
    }
    .slide-4 .chart-body {
      display: flex; gap: 32px; flex: 1 1 auto; min-height: 0;
      align-items: stretch; width: 100%;
    }
    .chart-svg {
      display: block; flex: 1 1 auto; min-width: 0; min-height: 0;
      width: 100%; height: 100%; max-width: 100%; max-height: 100%;
    }
    .slide-4 .data-column {
      display: flex; flex-direction: column; gap: 16px;
      flex: 0 0 240px; width: 240px; min-width: 0;
    }
    .slide-4 .data-box {
      flex: 1 1 0; min-height: 0; border: 3px solid var(--border-color);
      background: var(--card-elevated); padding: 18px 20px; text-align: center;
      display: flex; flex-direction: column; justify-content: center; gap: 6px;
    }
    .slide-4 .data-box .data-num {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 900; font-size: 36px; color: var(--white);
      display: block; margin-bottom: 4px;
    }
    .slide-4 .data-box .data-label {
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 17px; font-weight: 600; text-transform: uppercase;
      color: var(--muted);
    }

    /* SLIDE 5: Big Statement / Quote */
    .slide-5 {
      background: var(--black);
      flex-direction: column; justify-content: center; align-items: center;
      text-align: center; position: relative;
    }
    .slide-5 .quote-frame {
      border: var(--border); background: var(--card);
      padding: 60px 80px; box-shadow: var(--shadow);
      max-width: 1000px; position: relative;
    }
    .slide-5 .quote-text {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 900; font-size: clamp(28px, 3.5vw, 52px);
      line-height: 1.15; letter-spacing: -0.02em;
      text-transform: uppercase; margin-bottom: 32px; color: var(--white);
    }
    .slide-5 .quote-author {
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 22px; font-weight: 600; color: var(--muted);
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .slide-5 .deco-quote-marks {
      position: absolute; top: -30px; left: 40px;
      font-size: 120px; font-weight: 900; line-height: 1;
      color: var(--yellow); -webkit-text-stroke: 3px var(--border-color);
    }

    /* SLIDE 6: Split Image + Text */
    .slide-6 {
      background: var(--black);
      flex-direction: row; gap: 0; padding: 0;
    }
    .slide-6 .split-visual {
      flex: 1; background: var(--card-elevated); color: var(--white);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 72px 8vw 72px 10vw; position: relative; overflow: hidden;
      border-right: var(--border);
    }
    .slide-6 .split-visual .visual-box {
      width: min(64vh, 82%); max-width: 440px; aspect-ratio: 1;
      border: 4px solid var(--border-color); background: var(--pink);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 900; font-size: clamp(36px, 4vw, 64px); text-align: center;
      color: var(--black); position: relative; box-shadow: var(--glow-pink);
    }
    .slide-6 .split-visual .visual-box::after {
      content: ''; position: absolute; top: 20px; left: 20px;
      width: 100%; height: 100%; background: var(--yellow);
      border: 4px solid var(--border-color); z-index: -1;
    }
    .slide-6 .split-visual .visual-label {
      position: absolute; top: 56px; left: 10vw;
      border: 4px solid var(--border-color); background: var(--yellow); color: var(--black);
      padding: 18px 34px; font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 28px; font-weight: 800; transform: rotate(-4deg);
    }
    .slide-6 .split-content {
      flex: 1; padding: 72px 10vw 72px 6vw; display: flex; flex-direction: column;
      justify-content: center; gap: 34px; background: var(--black);
    }
    .slide-6 .split-content > * {
      max-width: 720px;
    }
    .slide-6 .content-list {
      list-style: none; display: flex; flex-direction: column; gap: 24px;
    }
    .slide-6 .content-list li {
      display: flex; align-items: flex-start; gap: 18px;
      font-size: clamp(21px, 1.8vw, 28px); line-height: 1.5; font-weight: 600;
      color: var(--white);
    }
    .slide-6 .content-list .list-num {
      flex-shrink: 0; width: 48px; height: 48px;
      border: 3px solid var(--border-color); background: var(--yellow);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-weight: 700; font-size: 22px; color: var(--black);
    }

    /* SLIDE 7: Timeline / Process */
    .slide-7 {
      background: var(--black);
      flex-direction: column; justify-content: center;
    }
    .slide-7 .slide-header { margin-bottom: 48px; }
    .slide-7 .timeline {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 38px;
      width: 100%;
      position: relative;
      padding-top: 22px;
    }
    .slide-7 .timeline-step {
      border: var(--border); background: var(--card);
      padding: 34px 28px 30px; box-shadow: var(--shadow-sm);
      position: relative; min-height: 280px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .slide-7 .timeline-step::before {
      content: '';
      position: absolute;
      top: -27px;
      left: 50%;
      width: 34px;
      height: 34px;
      border: var(--border);
      border-radius: 50%;
      background: var(--black);
      box-shadow: 5px 5px 0 var(--yellow);
      transform: translateX(-50%);
    }
    .slide-7 .step-num {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 900; font-size: clamp(40px, 4vw, 64px);
      line-height: 1; opacity: 0.6; text-align: center;
    }
    .slide-7 .step-title {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 800; font-size: clamp(18px, 1.6vw, 26px);
      text-transform: uppercase; text-align: center;
    }
    .slide-7 .step-desc {
      font-size: clamp(18px, 1.45vw, 24px); line-height: 1.55; font-weight: 500;
      color: var(--muted);
    }

    /* SLIDE 8: Statistics / Numbers */
    .slide-8 {
      background: var(--black);
      flex-direction: column; justify-content: center;
    }
    .slide-8 .slide-header { margin-bottom: 48px; }
    .slide-8 .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; width: 100%;
    }
    .slide-8 .stat-card {
      border: var(--border); background: var(--card);
      padding: 32px; box-shadow: var(--shadow-sm);
      text-align: center; position: relative;
    }
    .slide-8 .stat-card:nth-child(odd) { transform: rotate(-2deg); }
    .slide-8 .stat-card:nth-child(even) { transform: rotate(2deg); }
    .slide-8 .stat-card:nth-child(1) { box-shadow: var(--glow-pink); }
    .slide-8 .stat-card:nth-child(2) { box-shadow: var(--glow-blue); }
    .slide-8 .stat-card:nth-child(3) { box-shadow: var(--glow-green); }
    .slide-8 .stat-card:nth-child(4) { box-shadow: var(--glow-yellow); }
    .slide-8 .stat-number {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      font-weight: 900; font-size: clamp(36px, 4vw, 64px);
      line-height: 1; margin-bottom: 12px; color: var(--white);
    }
    .slide-8 .stat-label {
      font-family: 'Space Grotesk', 'Noto Sans SC', monospace;
      font-size: 17px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--muted);
    }
    .slide-8 .stat-deco {
      position: absolute; top: 8px; right: 8px;
      width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border-color);
    }

    /* SLIDE 9: Team / Grid */
    .slide-9 {
      background: var(--black);
      flex-direction: column; justify-content: center; gap: 48px;
      padding-bottom: 110px;
    }
    .slide-9 .slide-header { margin-bottom: 48px; }
    .slide-9 .team-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%;
